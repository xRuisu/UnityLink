<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Teamwork is the key to excellence. Build Teams, work better and more efficiently."
    />
    <meta
      property="og:title"
      content="Teamwork is the key to excellence. Build Teams, work better and more efficiently."
    />
    <meta
      property="og:description"
      content="Teamwork is the key to excellence. Build Teams, work better and more efficiently."
    />
    <meta property="og:type" content="website" />
    <title>Unity Link</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Gruppo&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="block--dark">
    <header class="bg block--skewed-top">
      <nav>
        <div class="drop-menu-container" onclick="toggleNavigation()">
          <div class="emblem-container--small">
            <p class="emblem-text--small anton-sc-regular">!</p>
            <div class="circle--small circle-one--small"></div>
            <div class="circle--small circle-two--small"></div>
          </div>
          <a href="/user/{user_id}"
            ><img
              id="user"
              class="hide-element"
              src="images/svgs/user.svg"
              alt="user"
          /></a>
          <a href="/teams/{teams_list}">
            <img
              id="teams"
              class="hide-element"
              src="images/svgs/teams.svg"
              alt="teams"
            />
          </a>
          <a href="Dashboard.html"
            ><img
              id="dash"
              class="hide-element"
              src="images/svgs/dash.svg"
              alt="dash"
          /></a>
          <a href="/settings">
            <img
              id="settings"
              class="hide-element"
              src="images/svgs/settings.svg"
              alt="settings"
            />
          </a>
          <div id="bg" class="hide-element"></div>
        </div>
      </nav>
      <section class="header-container block--skewed-bottom">
        <h1 class="unitylink__title anton-sc-regular">Un!ty L!nk</h1>
        <h2 class="sub__title gruppo-regular">There's No 'I' in Team</h2>
      </section>
    </header>
    <main>
      <form id="loginPopup" class="login-container">
        <h3 class="login-text anton-sc-regular">Login</h3>
        <label class="input-labels gruppo-regular" for="user-email"
          >Email:</label
        >
        <input class="input-container" id="user-email" type="text" />
        <label class="input-labels gruppo-regular" for="user-password"
          >Password:</label
        >
        <input class="input-container" id="user-password" type="password" />
        <button class="close-popup button-effect" onclick="closeLoginPopup()">
          Close
        </button>
      </form>
      <div id="loginContainer" class="container">
        <div class="button-container">
          <a
            class="button gruppo-regular"
            onmouseover="moveArrow()"
            onclick="openLoginPopup()"
          >
            Login
            <p id="firstArrow" class="button__arrow">➤</p>
          </a>
        </div>
        <div class="button-container">
          <a
            class="button gruppo-regular"
            href="Dashboard.html"
            onmouseover="moveArrow()"
          >
            View Teams
            <p id="secondArrow" class="button__arrow">➤</p>
          </a>
        </div>
      </div>
    </main>
    <div class="emblem-container--large">
      <p class="emblem-text--large anton-sc-regular">!</p>
      <div class="circle--large circle-one--large"></div>
      <div class="circle--large circle-two--large"></div>
    </div>
    <footer class="footer-container">
      <p class="copy__right gruppo-regular">&copy; 2024 Unity Link</p>
      <a href="https://github.com/xRuisu"
        ><p class="copy__right--sub gruppo-regular">xRuisu</p>
      </a>
    </footer>
    <script src="js/main.js"></script>
  </body>
</html>
