<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Teamwork is the key to excellence. Build Teams, work better and more efficiently."
    />
    <meta
      property="og:title"
      content="Teamwork is the key to excellence. Build Teams, work better and more efficiently."
    />
    <meta
      property="og:description"
      content="Teamwork is the key to excellence. Build Teams, work better and more efficiently."
    />
    <meta property="og:type" content="website" />
    <title class="anton__sc--regular">Unity Link</title>
    <link
      rel="stylesheet"
      href="/UnityLink/UnityLink-Frontend/playground/playground-styles.css"
    />
    <link rel="stylesheet" href="/UnityLink/UnityLink-Frontend/css/normalize.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="/UnityLink-Frontend/favicon.svg"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Gruppo&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg--white">
    <header class="bg--black block--skewed-top">
      <div class="menu-container">
        <img
          class="menu-item--github"
          src="/UnityLink/UnityLink-Frontend/images/svgs/github-white.svg"
          alt="Github"
        />
        <img
          class="menu-item--profile"
          src="/UnityLink/UnityLink-Frontend/images/svgs/user.svg"
          alt="User Profile"
        />
        <img
          class="menu-item--search"
          src="/UnityLink/UnityLink-Frontend/images/search-svgrepo-com.png"
          alt="search"
        />
        <form action="#">
          <input class="search__input" type="text" />
        </form>
      </div>
      <nav>
        <div class="drop-menu-container" onclick="toggleNavigation()">
          <div class="emblem-container--small">
            <p class="emblem__text--small anton__sc--regular">!</p>
            <div class="circle__small circle__one--small"></div>
            <div class="circle__small circle__two--small"></div>
          </div>
          <a href="/user/{user_id}">
            <img
              id="user"
              class="hide__element"
              src="/UnityLink/UnityLink-Frontend/images/svgs/user.svg"
              alt="User Profile"
            />
          </a>
          <a href="/teams/{teams_list}">
            <img
              id="teams"
              class="hide__element"
              src="/UnityLink/UnityLink-Frontend/images/svgs/teams.svg"
              alt="Teams"
            />
          </a>
          <a href="Dashboard.html">
            <img
              id="dash"
              class="hide__element"
              src="/UnityLink/UnityLink-Frontend/images/svgs/dash.svg"
              alt="Dashboard"
            />
          </a>
          <a href="/settings">
            <img
              id="settings"
              class="hide__element"
              src="/UnityLink/UnityLink-Frontend/images/svgs/settings.svg"
              alt="Settings"
            />
          </a>
          <div id="bg" class="hide__element"></div>
        </div>
      </nav>
      <section class="header-container">
        <a
          href="/UnityLink/UnityLink-Frontend/Index.html"
          class="unitylink__title anton__sc--regular"
          >Un!ty L!nk</a
        >
        <h2 class="sub__title gruppo__regular">Dashboard</h2>
      </section>
    </header>
    <main>Example Text</main>
    <div id="emblem" class="emblem-container--large">
      <p class="emblem__text--large anton__sc--regular">!</p>
      <div class="circle__large circle__one--large"></div>
      <div class="circle__large circle__two--large"></div>
    </div>
    <footer class="footer-container">
      <p class="copy__right gruppo__regular">
        &copy; 2024 UnityLink | Un!tyL!nk
      </p>
      <a href="https://github.com/xRuisu">
        <p class="copy__right--sub gruppo__regular">xRuisu</p>
      </a>
    </footer>
    <script src="/UnityLink/UnityLink-Frontend/js/main.js"></script>
  </body>
</html>
